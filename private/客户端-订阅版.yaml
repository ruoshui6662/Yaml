# ============================================================
# Mihomo / Clash.Meta 配置（客户端软件 · 订阅版）
# 适用：Clash Verge Rev / mihomo party / FlClash 等带界面的客户端
#
# 改动说明：
#   1. 已删除外部管理面板（external-controller / external-ui / secret），
#      由客户端软件自带界面管理，无需 zashboard
#   2. 节点改为「订阅」方式：请在下方 proxy-providers 的 url 处填写订阅链接
#   3. 已关闭 IPv6（全局 + DNS）
#   4. 各类分流规则、规则集（rule-providers / rules）保持不变
#   5. store-selected 改为 true：软件里手动切换的节点重启后会保留
#   6. 每个分流组都已通过 use: 机场订阅 接入全部节点，
#      可在任意分组里直接选择具体节点
# ============================================================

mixed-port: 7893
mode: rule
allow-lan: true
bind-address: "*"
tcp-concurrent: true
unified-delay: true
log-level: info
ipv6: false

# 强制以 Clash/Mihomo 格式拉取订阅
# （很多机场按 User-Agent 决定返回格式：UA 里带 clash 才会返回 Clash YAML，
#   否则返回 base64 通用格式，导致 mihomo 只解析出一个节点）
global-ua: clash.meta

profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: true
  stack: system
  dns-hijack:
    - 0.0.0.0:53
  auto-route: true
  auto-redirect: true

sniffer:
  enable: true
  override-destination: true
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    QUIC:
      ports: [443]
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  force-domain:
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"
    - "+.claude.ai"
    - "+.anthropic.com"
    - "+.copilot.microsoft.com"
    - "+.bing.com"
  skip-domain:
    - "+.apple.com"
    - Mijia Cloud
    - dlg.io.mi.com
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.push.apple.com"

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: false
  default-nameserver:
    - 114.114.114.114
    - tls://223.5.5.5:853
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

# ==================== 订阅节点（在此填写） ====================
proxy-providers:
  机场订阅:
    type: http
    # ↓↓↓ 在引号内填写你的机场订阅链接 ↓↓↓
    url: "在此处粘贴你的订阅链接"
    # ↑↑↑ 在引号内填写你的机场订阅链接 ↑↑↑
    path: ./proxies/airport.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    # 可选：按关键字保留 / 排除节点（按需取消注释）
    # filter: "香港|HK|日本|JP|新加坡|SG|美国|US|台湾|TW"
    # exclude-filter: "官网|流量|过期|剩余|套餐|到期|网址"

  # 如需第二个订阅：复制上面整段、改个名字、改 url 和 path 即可，例如：
  # 机场订阅2:
  #   type: http
  #   url: "第二个订阅链接"
  #   path: ./proxies/airport2.yaml
  #   interval: 86400
  #   health-check:
  #     enable: true
  #     url: https://www.gstatic.com/generate_204
  #     interval: 300

proxies:
  - name: "直连"
    type: direct
    udp: true

proxy-groups:
  # 主选择：包含订阅里的全部节点 + 自动选择 + 直连
