mixed-port: 7893
mode: rule
allow-lan: true
bind-address: "*"
tcp-concurrent: true
unified-delay: true
log-level: info
ipv6: true

profile:
  store-selected: true
  store-fake-ip: true

external-controller: 0.0.0.0:9090
external-ui-name: zashboard
external-ui: ui
secret: ""
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip

tun:
  enable: true
  stack: system
  dns-hijack:
    - 0.0.0.0:53
  auto-route: true
  auto-redirect: true

sniffer:
  enable: true
  override-destination: true
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    QUIC:
      ports: [443]
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  force-domain:
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"
  skip-domain:
    - "+.apple.com"
    - Mijia Cloud
    - dlg.io.mi.com
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.push.apple.com"

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: false
  default-nameserver:
    - 114.114.114.114
    - tls://223.5.5.5:853
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

proxies:
  - name: "直连"
    type: direct
    udp: true

  - name: "Hysteria2"
    type: hysteria2
    server: "YOUR_HYSTERIA2_SERVER"
    port: 443
    password: "YOUR_HYSTERIA2_PASSWORD"
    alpn:
      - h3
    skip-cert-verify: true

  - name: "VLESS-Reality"
    type: vless
    server: "YOUR_VLESS_SERVER"
    port: 443
    udp: true
    uuid: "YOUR_VLESS_UUID"
    flow: xtls-rprx-vision
    packet-encoding: xudp
    tls: true
    servername: "YOUR_REALITY_SERVERNAME"
    client-fingerprint: chrome
    reality-opts:
      public-key: "YOUR_REALITY_PUBLIC_KEY"
      short-id: "YOUR_REALITY_SHORT_ID"

  - name: "AnyTLS"
    type: anytls
    server: "YOUR_ANYTLS_SERVER"
    port: 443
    password: "YOUR_ANYTLS_PASSWORD"
    udp: true
    client-fingerprint: chrome
    skip-cert-verify: true
    alpn:
      - h2
      - http/1.1
    idle-session-check-interval: 30
    idle-session-timeout: 30
    min-idle-session: 0
    # 如后续拿到域名可取消注释
    # sni: "YOUR_ANYTLS_SNI"

