mixed-port: 7893
mode: rule
allow-lan: true
bind-address: "*"
tcp-concurrent: true
unified-delay: true
log-level: info
ipv6: true

profile:
  store-selected: true
  store-fake-ip: true

external-controller: 0.0.0.0:9090
external-ui-name: zashboard
external-ui: ui
secret: ""
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip

tun:
  enable: true
  stack: system
  dns-hijack:
    - 0.0.0.0:53
  auto-route: true
  auto-redirect: true

sniffer:
  enable: true
  override-destination: true
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    QUIC:
      ports: [443]
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  force-domain:
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"
  skip-domain:
    - "+.apple.com"
    - Mijia Cloud
    - dlg.io.mi.com
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.push.apple.com"

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: false
  default-nameserver:
    - 114.114.114.114
    - tls://223.5.5.5:853
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

proxies:
  - name: "直连"
    type: direct
    udp: true

proxy-providers:
  机场订阅:
    type: http
    # 替换成你自己的机场订阅链接
    url: "YOUR_SUBSCRIPTION_URL"
    path: ./proxy_providers/airport.yaml
    interval: 3600
    proxy: DIRECT
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true
      expected-status: 204
    override:
      udp: true
      skip-cert-verify: true
      # 可选：给所有订阅节点统一加前缀，想关闭就改成 ""
      additional-prefix: "[自定义机场] "
    # 过滤机场常见“伪节点”，避免剩余流量/到期时间/官网等内容出现在节点列表
    exclude-filter: "(?i)(剩余流量|流量剩余|套餐到期|到期时间|官网|官方网址|网站|订阅|到期|流量|重置|客服|工单|公告|通知|使用说明|剩余|有效期|expire|expiry|expired|traffic|bandwidth|remain|remaining|reset|官网地址|备用网址|home|dashboard)"

proxy-groups:
