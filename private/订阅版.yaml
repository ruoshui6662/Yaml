  pt_tracker:
    type: inline
    behavior: classical
    payload:
      - DOMAIN-KEYWORD,tracker
      - DOMAIN-KEYWORD,announce
      - DOMAIN-KEYWORD,scrape
      - DOMAIN-SUFFIX,opentrackr.org
      - DOMAIN-SUFFIX,nyaa.si
      - DOMAIN-SUFFIX,m-team.io
      - DOMAIN-SUFFIX,pterclub.com
      - DOMAIN-SUFFIX,hdhome.org
      - DOMAIN-SUFFIX,ourbits.club
      - DOMAIN-SUFFIX,ttg.im

rules:
